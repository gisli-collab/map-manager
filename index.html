<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Map Manager</h1>
      <p>Manage main categories, sub-categories, and map shelf dot assignments.</p>
    </header>

    <main class="layout">
      <section class="panel" aria-label="Category manager">
        <h2>Category Tree</h2>

        <form id="main-category-form" class="form-row">
          <input id="main-category-input" type="text" placeholder="New main category" required />
          <button type="submit">Add Main</button>
        </form>

        <form id="sub-category-form" class="form-row">
          <select id="sub-main-select" required></select>
          <input id="sub-category-input" type="text" placeholder="New sub category" required />
          <button type="submit">Add Sub</button>
        </form>

        <div id="category-tree" class="tree"></div>
      </section>

      <section class="panel" aria-label="Map and assignments">
        <h2>Dot Map Assignment</h2>
        <div class="controls">
          <label>
            Main category
            <select id="assign-main"></select>
          </label>
          <label>
            Sub category
            <select id="assign-sub"></select>
          </label>
        </div>

        <p id="map-status" class="status">Select a sub-category and click map dots.</p>

        <div id="store-map" class="store-map" aria-label="Store map"></div>

        <h3>Current selected sub-category dot codes</h3>
        <pre id="selected-sub-dots" class="json-box"></pre>

        <h3>Subcategories on selected dot</h3>
        <ul id="dot-subcategories"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
